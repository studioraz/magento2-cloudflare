name: Trigger Copilot Documentation

on:
  push:
    branches:
      - main
      - feature/SRP-1362-automatic-documentation
    paths:
      - '**/*.php'
      - '**/*.xml'
      - '**/*.phtml'

permissions:
  contents: read
  issues: write

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect merge context
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            const commit = context.payload.head_commit;
            const sha = context.sha;
            const shortSha = sha.substring(0, 7);
            const date = new Date().toISOString().split('T')[0];

            // Get latest tag for reference
            const tags = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 5,
            });
            const latestTag = tags.data.length > 0 ? tags.data[0].name : null;

            // Get the merged PR if this was a PR merge
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const pr = prs.data.find(p => p.merged_at !== null);

            const prInfo = pr
              ? `- **PR:** [#${pr.number} — ${pr.title}](${pr.html_url})`
              : `- **Commit:** [\`${shortSha}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${sha})`;

            core.setOutput('sha', sha);
            core.setOutput('short_sha', shortSha);
            core.setOutput('date', date);
            core.setOutput('latest_tag', latestTag || '');
            core.setOutput('pr_info', prInfo);
            core.setOutput('commit_message', commit.message.split('\n')[0]);
            core.setOutput('diff_url',
              `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${sha}`
            );

      - name: Get changed files and diff
        id: diff
        run: |
          SHA="${{ steps.context.outputs.sha }}"

          CHANGED=$(git diff HEAD~1 HEAD --name-only -- '*.php' '*.xml' | head -40)
          DIFF=$(git diff HEAD~1 HEAD -- '*.php' \
            | grep -E '^(\+\+\+|---|@@|[+-].*(public |protected |class |interface |function ))' \
            | head -120)

          echo "$CHANGED" > /tmp/changed_files.txt
          echo "$DIFF" > /tmp/diff_summary.txt

      - name: Create documentation issue for Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const sha = '${{ steps.context.outputs.sha }}';
            const shortSha = '${{ steps.context.outputs.short_sha }}';
            const date = '${{ steps.context.outputs.date }}';
            const latestTag = '${{ steps.context.outputs.latest_tag }}';
            const prInfo = `${{ steps.context.outputs.pr_info }}`;
            const commitMessage = '${{ steps.context.outputs.commit_message }}';
            const diffUrl = '${{ steps.context.outputs.diff_url }}';

            const changedFiles = fs.readFileSync('/tmp/changed_files.txt', 'utf8').trim();
            const diffSummary = fs.readFileSync('/tmp/diff_summary.txt', 'utf8').trim();

            if (!changedFiles) {
              console.log('No PHP/XML files changed, skipping documentation issue.');
              return;
            }

            const body = `
            ## Merge Information
            - **Date:** ${date}
            - **Diff:** ${diffUrl}
            ${prInfo}
            ${latestTag ? `- **Current latest tag:** \`${latestTag}\`` : ''}

            ## Commit Message
            ${commitMessage}

            ## Changed Files
            \`\`\`
            ${changedFiles}
            \`\`\`

            ## Diff Summary
            \`\`\`diff
            ${diffSummary}
            \`\`\`

            ## Your Task

            Follow the instructions in \`.github/instructions/wiki-docs.instructions.md\`.

            1. Analyze the diff and changed files above
            2. Update \`wiki/Release-Notes.md\` if the changes introduce user-visible improvements or fixes
            3. Update \`wiki/Home.md\` if module capabilities or configuration changed
            4. If \`wiki/Home.md\` does not exist yet — create it from scratch based on the module structure
            5. If \`wiki/Release-Notes.md\` does not exist yet — create it from scratch
            6. Open a pull request with your changes
            7. Do NOT modify any PHP, XML, or other source files

            ## Acceptance Criteria
            - [ ] \`wiki/\` files reflect the current state of the module after this merge
            - [ ] All descriptions are written in plain language
            - [ ] No source files modified
            `.trim();

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📝 docs: update wiki after merge — ${commitMessage}`,
              body: body,
              labels: ['documentation'],
              assignees: ['copilot'],
            });

            console.log(`Issue #${issue.data.number}: ${issue.data.html_url}`);
